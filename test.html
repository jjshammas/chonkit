<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Empty Page</title>
		<style>
			body {
				padding: 100px;
				font: monospace;
			}

			.button-container {
				position: relative;
			}

			.button {
				position: relative;
				display: inline-block;
				background: red;
				padding: 20px;
				z-index: 2;
			}

			.shadow {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: url(#pppixelate-pattern);
				pointer-events: none;
				z-index: 1;
			}
		</style>
	</head>
	<body>
		<div class="button-container">
			<div class="button">hi</div>
			<div class="shadow">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					version="1.1"
					xmlns:xlink="http://www.w3.org/1999/xlink"
					xmlns:svgjs="http://svgjs.dev/svgjs"
					preserveAspectRatio="xMidYMid slice"
					width="100%"
					height="24"
				>
					<defs>
						<pattern
							id="pppixelate-pattern"
							width="2"
							height="2"
							patternUnits="userSpaceOnUse"
							patternTransform="translate(0 0) scale(10) rotate(0)"
							shape-rendering="crispEdges"
						>
							<rect
								width="1"
								height="1"
								x="0"
								y="0"
								fill="hsl(0, 0%, 0%)"
							></rect>
							<rect
								width="1"
								height="1"
								x="1"
								y="1"
								fill="hsl(0, 0%, 0%)"
							></rect>
						</pattern>
					</defs>
					<rect
						width="100%"
						height="100%"
						fill="url(#pppixelate-pattern)"
					></rect>
				</svg>
			</div>
		</div>
	</body>
</html>
